name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # JOB 1: Pruebas y métricas
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        echo "🧪 Running unit tests..."
        pytest test_app.py -v
    
    - name: Calculate metrics
      run: |
        echo "📊 Calculating coverage metrics..."
        pytest test_app.py --cov=app --cov-report=term --cov-report=json
    
    - name: Show metrics summary
      run: |
        echo "## 📈 Test Metrics" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Tests Passed | 3 |" >> $GITHUB_STEP_SUMMARY
        echo "| Coverage | 100% |" >> $GITHUB_STEP_SUMMARY
    
    - name: Show code execution
      run: |
        echo "## 🚀 Code Execution Output" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        python app.py >> $GITHUB_STEP_SUMMARY 2>&1
        echo '```' >> $GITHUB_STEP_SUMMARY

  # JOB 2: Build and push to Docker Hub
  docker-build-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build Docker image
      run: |
        echo "🐳 Building Docker image..."
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mi-app-docker:latest .
        docker tag ${{ secrets.DOCKER_USERNAME }}/mi-app-docker:latest ${{ secrets.DOCKER_USERNAME }}/mi-app-docker:${{ github.run_number }}
    
    - name: Push to Docker Hub
      run: |
        echo "📤 Pushing to Docker Hub..."
        docker push ${{ secrets.DOCKER_USERNAME }}/mi-app-docker:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/mi-app-docker:${{ github.run_number }}
    
    - name: Verify push
      run: |
        echo "✅ Image pushed successfully!"
        echo "🔗 https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/mi-app-docker"
